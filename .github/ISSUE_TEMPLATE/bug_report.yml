name: Bug Report
about: 报告一个 Bug / Report a bug
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈！请尽量填写以下信息，帮助我们快速定位问题。
        Thanks for reporting! Please fill in the details below to help us diagnose.

  - type: input
    id: version
    attributes:
      label: 版本号 / Version
      description: 你使用的 MyZero 版本（如 v1.0.4）
      placeholder: v1.0.4
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统 / OS
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
        - 其他 / Other
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: 运行方式 / Runtime
      options:
        - 安装包 (.exe) / Installer
        - 源码运行 / Source code
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Description
      description: 清晰简洁地描述你遇到的问题
      placeholder: |
        例如：综合优化模式下进度条来回跳动
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Reproduce Steps
      description: 如何一步步触发这个 Bug
      placeholder: |
        1. 打开应用
        2. 选择