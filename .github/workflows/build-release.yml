name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Python dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pyinstaller

    - name: Install frontend dependencies and build
      run: cd frontend && npm ci && npm run build

    - name: Build with PyInstaller
      run: pyinstaller myzero.spec --clean --noconfirm

    - name: Copy runtime assets
      run: |
        copy backend\.env.example dist\MyZero\.env

    - name: Install Inno Setup
      run: choco install innosetup --yes

    - name: Download ChineseSimplified language file
      run: |
        curl -L -o "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl" https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl

    - name: Build installer
      run: ISCC installer.iss

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyZero-windows
        path: dist/MyZero/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/MyZero-Setup-*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
