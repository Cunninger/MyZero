name: Auto Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve version
      id: ver
      shell: pwsh
      run: |
        if ("${{ github.ref_type }}" -eq "tag") {
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
        } else {
          $version = (Get-Content VERSION -Raw).Trim()
          $tag = "v$version"
        }
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "tag=$tag" >> $env:GITHUB_OUTPUT
        Write-Output "Version: $version, Tag: $tag"

    - name: Verify VERSION matches tag
      shell: pwsh
      run: |
        $fileVersion = (Get-Content VERSION -Raw).Trim()
        $expected = "${{ steps.ver.outputs.version }}"
        if ($fileVersion -ne $expected) {
          Write-Error "VERSION file ($fileVersion) does not match tag ($expected). Aborting."
          exit 1
        }
        Write-Output "VERSION check passed: $fileVersion"

    - name: Get previous tag
      id: prev_tag
      shell: pwsh
      run: |
        $currentTag = "${{ steps.ver.outputs.tag }}"
        $tags = git tag --sort=-creatordate | Where-Object { $_ -ne $currentTag } | Select-Object -First 1
        if ($tags) {
          Write-Output "tag=$tags" >> $env:GITHUB_OUTPUT
        } else {
          Write-Output "tag=" >> $env:GITHUB_OUTPUT
        }

    - name: Clean old artifacts
      shell: pwsh
      run: |
        if (Test-Path output) { Remove-Item -Recurse -Force output }
        if (Test-Path dist) { Remove-Item -Recurse -Force dist }

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Python dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pyinstaller

    - name: Install frontend dependencies and build
      run: cd frontend && npm ci && npm run build

    - name: Build with PyInstaller
      run: pyinstaller myzero.spec --clean --noconfirm

    - name: Copy runtime assets
      run: |
        copy backend\.env.example dist\MyZero\.env

    - name: Install Inno Setup
      run: choco install innosetup --yes

    - name: Download ChineseSimplified language file
      run: |
        curl -L -o "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl" https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl

    - name: Build installer
      run: ISCC installer.iss

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.tag }}
        name: MyZero ${{ steps.ver.outputs.version }}
        body: |
          ## 更新内容
          本次版本包含问题修复与体验优化。

          ${{ steps.prev_tag.outputs.tag != '' && format('**完整变更日志**: [{0}...{1}](../../compare/{0}...{1})', steps.prev_tag.outputs.tag, steps.ver.outputs.tag) || '' }}

          ## 下载
          | 文件 | 大小 | 说明 |
          |------|------|------|
          | `MyZero-Setup-${{ steps.ver.outputs.version }}.exe` | ~16 MB | Windows 安装包（推荐） |

          ## 安装说明
          1. 下载上方的 `.exe` 安装包；
          2. 双击运行，按向导完成安装；
          3. 安装完成后桌面会出现 **MyZero** 快捷方式。

          > 首次启动若被杀毒软件拦截，请选择「允许运行」。

          ## 校验文件完整性
          下载后可在 PowerShell 中执行：
          ```powershell
          certutil -hashfile MyZero-Setup-${{ steps.ver.outputs.version }}.exe SHA256
          ```
          将输出的哈希值与下方 `Assets` 中显示的 SHA256 比对即可。
        files: output/MyZero-Setup-*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
